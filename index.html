<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 3D Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            color: white; font-family: sans-serif; font-size: 24px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="blocker">Click to Play</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. Setup Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xefd1b5);
        scene.fog = new THREE.FogExp2(0xefd1b5, 0.0025);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Add Lighting
        const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 2.5);
        scene.add(light);

        // 3. Create a Floor and Obstacles (Voxel / Block Style like Kirka)
        const floorGeo = new THREE.PlaneGeometry(2000, 2000);
        floorGeo.rotateX(-Math.PI / 2);
        const floorMat = new THREE.MeshBasicMaterial({ color: 0x557a46 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        scene.add(floor);

        // Add some random blocks
        const boxGeo = new THREE.BoxGeometry(20, 20, 20);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
        for (let i = 0; i < 50; i++) {
            const box = new THREE.Mesh(boxGeo, boxMat);
            box.position.x = Math.random() * 400 - 200;
            box.position.z = Math.random() * 400 - 200;
            box.position.y = 10;
            scene.add(box);
        }

        // 4. Controls & Movement Setup
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');

        blocker.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => blocker.style.display = 'none');
        controls.addEventListener('unlock', () => blocker.style.display = 'flex');

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveForward = true;
            if (e.code === 'KeyS') moveBackward = true;
            if (e.code === 'KeyA') moveLeft = true;
            if (e.code === 'KeyD') moveRight = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveForward = false;
            if (e.code === 'KeyS') moveBackward = false;
            if (e.code === 'KeyA') moveLeft = false;
            if (e.code === 'KeyD') moveRight = false;
        });

        camera.position.y = 10; // Eye height

        // 5. Game Loop
        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                // Apply deceleration (friction)
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                // Apply movement acceleration
                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                // Move camera
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                prevTime = time;
            }

            renderer.render(scene, camera);
        }
        animate();

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
